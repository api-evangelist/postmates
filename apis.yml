apis:
  - aid: postmates:postmates-fleet-api-historical
    name: Postmates Fleet API (Historical / Deprecated)
    description: >-
      The Postmates Fleet API (also referred to as the Postmates On-Demand
      Delivery API and Postmates Anywhere API) was a REST API that let
      merchants programmatically create delivery jobs, quote pickup and
      dropoff fares, dispatch Postmates couriers, and receive webhook updates
      on delivery status. It was deprecated following the Uber acquisition and
      is no longer accepting new developer signups. New integrations should
      migrate to the Uber Direct API.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://postmates.com
    baseURL: https://api.postmates.com
    tags:
      - Couriers
      - Delivery
      - Deprecated
      - Logistics
      - On-Demand
    properties:
      - type: Successor
        url: https://developer.uber.com/docs/deliveries
      - type: Status
        url: https://postmates.com
  - aid: postmates:uber-direct-successor
    name: Uber Direct API (Successor)
    description: >-
      Uber Direct is the supported successor to the Postmates Fleet and
      Postmates Customer APIs for programmatic on-demand delivery. Merchants
      use Direct to quote, create, and track deliveries dispatched to the
      Uber courier network in markets that Postmates historically served.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developer.uber.com/docs/deliveries
    baseURL: https://api.uber.com
    tags:
      - Couriers
      - Delivery
      - Logistics
      - On-Demand
      - Uber
    properties:
