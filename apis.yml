aid: postmates
name: Postmates
description: >-
  Postmates was an on-demand delivery platform founded in 2011 that pioneered
  urban courier-style delivery of food, groceries, alcohol, and convenience
  goods across the United States. Uber acquired Postmates in December 2020 for
  approximately $2.65 billion, and by 2023 the Postmates merchant, courier, and
  consumer experiences were fully absorbed into the Uber Eats and Uber Direct
  product lines. The historical Postmates Fleet API (courier dispatch) and
  Postmates Customer API (anonymous delivery) have been retired and replaced by
  Uber Direct as the supported on-demand delivery API surface. The Postmates
  consumer brand still operates as a front door that funnels orders into the
  Uber Eats marketplace. This profile is maintained as a historical record and
  redirect pointer to the successor Uber developer APIs.
